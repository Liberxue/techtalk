name: techtalk
description: "TechTalk — shadowing & pronunciation practice"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  go_router: ^13.0.0
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  hive_flutter: ^1.1.0
  http: ^1.2.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
