name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Archive
        run: |
          cd build/ios/iphoneos
          tar -czf ../../../techtalk-ios.tar.gz Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: techtalk-ios.tar.gz

  build-macos:
    name: macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Archive
        run: |
          cd build/macos/Build/Products/Release
          tar -czf ../../../../../techtalk-macos.tar.gz techtalk.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: techtalk-macos.tar.gz

  build-web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - name: Archive
        run: tar -czf techtalk-web.tar.gz -C build/web .
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: techtalk-web.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios, build-macos, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: artifacts/ios

      - uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: artifacts/web

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/android/app-release.apk
            artifacts/ios/techtalk-ios.tar.gz
            artifacts/macos/techtalk-macos.tar.gz
            artifacts/web/techtalk-web.tar.gz
